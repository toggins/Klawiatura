name: Build and release distributions

on:
  push:
    branches: [master]
    tags: [v*]
    paths-ignore:
      - README.md
      - .*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CRAZY_AHH_DEPS: >-
    python3-jinja2
    libasound2-dev libpulse-dev libaudio-dev libfribidi-dev libjack-dev
    libsndio-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev
    libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev libdrm-dev
    libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev libdbus-1-dev
    libibus-1.0-dev libudev-dev libthai-dev libpipewire-0.3-dev libwayland-dev
    libdecor-0-dev liburing-dev

jobs:
  release-desktop:
    name: Publish ${{ matrix.name }} binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - { name: Linux }
          - { name: Win32, mingw: 32 }
          - { name: Win64, mingw: 64 }
    env:
      CACHE_BUST: 1
      OUTNAME: Klawiatura-${{ github.ref_name == 'master' && 'dev' || github.ref_name }}-${{ matrix.name }}
      MINGW_ARCH: ${{ matrix.mingw == 32 && 'i686' || 'x86_64' }}
      MINGW_PACKAGES: >-
        g++-mingw-w64-${{ matrix.mingw == 32 && 'i686' || 'x86-64' }}-win32
        gcc-mingw-w64-${{ matrix.mingw == 32 && 'i686' || 'x86-64' }}-win32
      MINGW_SHEBANG: >-
        -D CMAKE_C_COMPILER=${MINGW_ARCH}-w64-mingw32-gcc
        -D CMAKE_CXX_COMPILER=${MINGW_ARCH}-w64-mingw32-g++
        -D CMAKE_RC_COMPILER=${MINGW_ARCH}-w64-mingw32-windres
        -D CMAKE_SYSTEM_NAME=Windows
        -D CMAKE_FIND_ROOT_PATH=/usr/${MINGW_ARCH}-w64-mingw32
        -D CMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER
        -D CMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY
        -D CMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
    steps:
      - name: Silence `git init` warning
        run: git config --global init.defaultBranch master
      - name: Checkout
        uses: actions/checkout@v7
      - name: Source Discord Social SDK
        run: |
          cd external/discord; git init
          git remote add origin https://${{ secrets.EXTERNAL_TOKEN }}@github.com/${{ secrets.EXTERNAL_USER }}/discord.git
          git pull origin master
      - name: Restore source timestamps for crazy CMake caching benefits
        uses: chetan/git-restore-mtime-action@v2
      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          version: 1.4
          packages: >-
            ${{ env.CRAZY_AHH_DEPS }}
            ${{ matrix.mingw && env.MINGW_PACKAGES || '' }}
      - name: Symlink MinGW compiler binaries
        if: matrix.mingw
        run: |
          sudo ln -sf /usr/bin/${MINGW_ARCH}-w64-mingw32-gcc{-win32,}
          sudo ln -sf /usr/bin/${MINGW_ARCH}-w64-mingw32-g++{-win32,}
      - name: Cache build dir
        id: cache-build
        uses: actions/cache@v6
        with:
          path: build
          key: ${{ env.CACHE_BUST }}-${{ matrix.name }}-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ env.CACHE_BUST }}-${{ matrix.name }}-${{ github.ref_name }}-
            ${{ env.CACHE_BUST }}-${{ matrix.name }}-
      - name: Configure
        run: |
          cmake -G Ninja -S . -B build -D CMAKE_BUILD_TYPE=Release \
            ${{ matrix.mingw && env.MINGW_SHEBANG || '' }} \
            -D CPACK_PACKAGE_FILE_NAME=${{ env.OUTNAME }}
      - name: Build
        run: cmake --build build --target all
      - name: Package
        run: cmake --build build --target package
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          draft: ${{ github.ref_name != 'master' }}
          tag_name: ${{ github.ref_name == 'master' && 'dev' || github.ref_name }}
          prerelease: ${{ github.ref_name == 'master' }}
          files: build/${{ env.OUTNAME }}.zip

  release-html5:
    name: Publish the HTML5 build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.publish.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      CACHE_BUST: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Restore source timestamps for crazy CMake caching benefits
        uses: chetan/git-restore-mtime-action@v2
      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          version: 1.1
          packages: ${{ env.CRAZY_AHH_DEPS }} nodejs
      - name: Source pasture-raised gluten-free emsdk
        uses: emscripten-core/setup-emsdk@main
        with:
          version: latest
          actions-cache-folder: emsdk-cache
      - name: Cache build dir
        id: cache-build
        uses: actions/cache@v6
        with:
          path: build
          key: ${{ env.CACHE_BUST }}-Web-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: |
            ${{ env.CACHE_BUST }}-Web-${{ github.ref_name }}-
            ${{ env.CACHE_BUST }}-Web-
      - name: Configure
        run: emcmake cmake -G Ninja -S . -B build -D CMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target Klawiatura
      - name: Prepare for distibution
        run: cp -vr build/Klawiatura.{js,wasm,data} www
      - name: Publish
        id: publish
        uses: nonk123/sanity-action@master
        with:
          push_to_github_pages: true
